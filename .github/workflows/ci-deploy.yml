name: CI and Deploy

# GitHub Actions is deprecating Node.js 20 for JavaScript-based actions.
# This opts the runner into Node.js 24 for those actions (checkout/setup-node),
# while keeping our project runtime pinned separately (see Setup Node step).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm start &
          sleep 6

      - name: Health check
        run: curl --fail http://localhost:3000/api/health

  deploy-render:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deploy trigger."
            exit 0
          fi

          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."
