<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK-WRITLY | Generate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <header class="app-header">
      <a class="logo" href="index.html"><span>SK</span><strong>SK-WRITLY</strong></a>
      <nav class="nav-links" aria-label="Main Navigation">
        <a href="index.html">Home</a>
        <a href="generate.html" class="active">Generate</a>
        <a href="account.html">Account</a>
        <a href="history.html">History</a>
      </nav>
      <div data-health class="health-chip">Checking backend...</div>
    </header>

    <main class="page-wrap">
      <section class="panel">
        <h1>Generate Content</h1>
        <p class="muted">Compose your prompt and generate AI writing output.</p>

        <label for="promptInput">Prompt</label>
        <textarea id="promptInput" class="input textarea" rows="7" placeholder="Describe what you want to write..."></textarea>

        <div class="control-row">
          <div>
            <label for="toneSelect">Tone</label>
            <select id="toneSelect" class="input">
              <option>Professional</option>
              <option>Friendly</option>
              <option>Confident</option>
              <option>Creative</option>
            </select>
          </div>
          <div>
            <label for="lengthSelect">Length</label>
            <select id="lengthSelect" class="input">
              <option>Short</option>
              <option selected>Medium</option>
              <option>Long</option>
            </select>
          </div>
        </div>

        <div class="action-row">
          <button id="generateBtn" class="btn btn-primary">Generate</button>
          <span id="providerBadge" class="pill">Provider: -</span>
          <span id="wordCount" class="pill">Words: 0</span>
        </div>

        <div id="outputBox" class="output-box">Generated output will appear here.</div>
      </section>
    </main>

    <footer class="app-footer">
      <p>SK-WRITLY - Generate Module</p>
      <p id="footerYear"></p>
    </footer>

    <script src="shared.js"></script>
    <script src="generate.js"></script>
  </body>
</html>
